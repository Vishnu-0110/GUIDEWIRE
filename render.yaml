services:
  - type: web
    name: gigshield-ai-service
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: gigshield-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PHONE_ENCRYPTION_KEY
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AQI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: TRAFFIC_PROVIDER
        value: tomtom
      - key: TRAFFIC_API_KEY
        sync: false
      - key: TRAFFIC_API_BASE_URL
        value: https://api.tomtom.com/traffic/services/4
      - key: TRAFFIC_MOCK_FALLBACK
        value: "true"
      - key: PAYMENT_PROVIDER
        value: custom_api
      - key: PAYMENT_API_BASE_URL
        sync: false
      - key: PAYMENT_API_KEY
        sync: false
      - key: PAYMENT_MOCK_FALLBACK
        value: "true"
      - key: PAYMENT_ACCEPT_PENDING_AS_PAID
        value: "true"
